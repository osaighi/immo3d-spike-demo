<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Immo3D — MASt3R+InstantSplat</title>
<style>
  * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  html, body { margin:0; height:100%; background:#000; color:#fff;
               font-family:-apple-system,system-ui,sans-serif; overflow:hidden;
               overscroll-behavior:none }
  #stage { position:fixed; inset:0 }
  #stage canvas { width:100%; height:100%; display:block; touch-action:none }
  #hud { position:fixed; top:max(12px,env(safe-area-inset-top)); left:12px;
         padding:8px 12px; background:rgba(0,0,0,.55); border-radius:8px;
         font-size:12px; backdrop-filter:blur(8px); pointer-events:none }
  #reset { position:fixed; bottom:max(20px,env(safe-area-inset-bottom));
           right:20px; padding:10px 14px; background:rgba(0,0,0,.7); color:#fff;
           border:0; border-radius:10px; font-size:13px; font-family:inherit;
           backdrop-filter:blur(8px); cursor:pointer }
</style>
</head>
<body>
<div id="stage"></div>
<div id="hud">Loading 1.4 MB…</div>
<button id="reset">⟲</button>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
  "gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
}}
</script>
<script type="module">
import * as GS from 'gaussian-splats-3d';
const hud = document.getElementById('hud');
const viewer = new GS.Viewer({
  rootElement: document.getElementById('stage'),
  cameraUp: [0, -1, 0],
  sharedMemoryForWorkers: false,
});
viewer.addSplatScene('./maison-mast3r.ksplat', { format: GS.SceneFormat.KSplat, progressiveLoad: true })
  .then(() => { hud.textContent = 'Maison MASt3R+InstantSplat · 11 min · $0.13 · 24 vues · 2k iters + clean'; viewer.start(); })
  .catch(e => { hud.textContent = 'Erreur : ' + e.message; });
document.getElementById('reset').onclick = () => location.reload();
</script>
</body>
</html>
