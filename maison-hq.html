<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Immo3D — Ta maison</title>
<style>
  * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  html, body { margin:0; height:100%; background:#000; color:#fff;
               font-family:-apple-system,system-ui,sans-serif; overflow:hidden;
               overscroll-behavior:none }
  #stage { position:fixed; inset:0 }
  #stage canvas { width:100%; height:100%; display:block; touch-action:none }
  #hud { position:fixed; top:max(12px,env(safe-area-inset-top)); left:12px;
         padding:8px 12px; background:rgba(0,0,0,.55); border-radius:8px;
         font-size:12px; backdrop-filter:blur(8px); pointer-events:none;
         max-width:65vw; z-index:10 }
  #modes { position:fixed; top:max(12px,env(safe-area-inset-top)); right:12px;
           display:flex; gap:4px; padding:4px; background:rgba(0,0,0,.55);
           border-radius:10px; backdrop-filter:blur(8px); z-index:20 }
  #modes button { background:transparent; border:0; color:#bbb;
                  padding:6px 12px; border-radius:7px; font-size:12px;
                  font-family:inherit; cursor:pointer }
  #modes button.on { background:#1f4fff; color:#fff }
  #reset { position:fixed; bottom:max(20px,env(safe-area-inset-bottom));
           right:20px; padding:10px 14px; background:rgba(0,0,0,.7); color:#fff;
           border:0; border-radius:10px; font-size:13px; font-family:inherit;
           backdrop-filter:blur(8px); cursor:pointer; z-index:20 }
  #joystick { position:fixed; bottom:max(20px,env(safe-area-inset-bottom));
              left:20px; width:140px; height:140px; z-index:20; display:none }
  body.walk #joystick { display:block }
  #help { position:fixed; bottom:max(20px,env(safe-area-inset-bottom));
          left:50%; transform:translateX(-50%); padding:8px 14px;
          background:rgba(0,0,0,.75); color:#fff; border-radius:8px;
          font-size:12px; backdrop-filter:blur(8px); pointer-events:none;
          transition: opacity 0.5s; z-index:10; text-align:center; max-width:90vw }
  body.walk #help { bottom:max(180px,calc(env(safe-area-inset-bottom)+180px)) }
  #help.fade { opacity:0 }
</style>
</head>
<body>
<div id="stage"></div>
<div id="hud">Loading 6.9 MB…</div>
<div id="modes">
  <button id="mOrbit" class="on">Orbiter</button>
  <button id="mWalk">Marcher</button>
</div>
<button id="reset">⟲</button>
<div id="joystick"></div>
<div id="help">1 doigt = tourner · 2 doigts = pan · pinch = zoom</div>

<!-- nipplejs : battle-tested mobile joystick -->
<script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.2/dist/nipplejs.min.js"></script>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
  "gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
}}
</script>
<script type="module">
import * as THREE from 'three';
import * as GS from 'gaussian-splats-3d';

const hud = document.getElementById('hud');
const help = document.getElementById('help');
const stage = document.getElementById('stage');

const viewer = new GS.Viewer({
  rootElement: stage,
  cameraUp: [0, -1, 0],
  sharedMemoryForWorkers: false,
  selfDrivenMode: true,
});

let sceneCenter = new THREE.Vector3();
let sceneRadius = 3;
let initialPos = new THREE.Vector3(0, 0, -3);

hud.textContent = 'Loading…';
viewer.addSplatScene('./maison-hq.ksplat', {
  format: GS.SceneFormat.KSplat,
  progressiveLoad: true,
}).then(() => {
  const scene = viewer.getSplatScene(0);
  const box = new THREE.Box3();
  if (scene && scene.geometry && scene.geometry.boundingBox) {
    box.copy(scene.geometry.boundingBox);
  } else {
    box.set(new THREE.Vector3(-3, -3, -3), new THREE.Vector3(3, 3, 3));
  }
  sceneCenter.copy(box.getCenter(new THREE.Vector3()));
  sceneRadius = Math.max(0.5, box.getSize(new THREE.Vector3()).length() * 0.5);
  initialPos.copy(sceneCenter).add(new THREE.Vector3(0, -sceneRadius * 0.3, sceneRadius * 1.5));
  resetCamera();
  hud.textContent = 'Ta maison HQ · 6.9 MB';
  setTimeout(() => help.classList.add('fade'), 6000);
  viewer.start();
}).catch(e => {
  hud.textContent = 'Erreur : ' + e.message;
  console.error(e);
});

function resetCamera() {
  viewer.camera.position.copy(initialPos);
  viewer.camera.lookAt(sceneCenter);
  if (viewer.controls && viewer.controls.target) {
    viewer.controls.target.copy(sceneCenter);
    viewer.controls.update?.();
  }
}
document.getElementById('reset').onclick = resetCamera;

// ---- Mode toggle ----
const orbitBtn = document.getElementById('mOrbit');
const walkBtn = document.getElementById('mWalk');
let mode = 'orbit';
let joystickInstance = null;
const move = { fwd: 0, right: 0 };

function setMode(m) {
  mode = m;
  document.body.classList.toggle('walk', m === 'walk');
  orbitBtn.classList.toggle('on', m === 'orbit');
  walkBtn.classList.toggle('on', m === 'walk');
  if (viewer.controls) viewer.controls.enabled = (m === 'orbit');

  if (m === 'walk') {
    help.classList.remove('fade');
    help.textContent = 'joystick = bouger · drag = regarder · WASD au clavier';
    setTimeout(() => help.classList.add('fade'), 5000);
    if (!joystickInstance) {
      joystickInstance = nipplejs.create({
        zone: document.getElementById('joystick'),
        mode: 'static',
        position: { left: '50%', top: '50%' },
        color: '#1f4fff',
        size: 120,
      });
      joystickInstance.on('move', (evt, data) => {
        if (!data.vector) return;
        // nipplejs y = up positive ; we want forward when pushed up
        move.fwd = data.vector.y;
        move.right = data.vector.x;
      });
      joystickInstance.on('end', () => { move.fwd = 0; move.right = 0; });
    }
  } else {
    help.classList.remove('fade');
    help.textContent = '1 doigt = tourner · 2 doigts = pan · pinch = zoom';
    setTimeout(() => help.classList.add('fade'), 5000);
  }
}
orbitBtn.onclick = () => setMode('orbit');
walkBtn.onclick = () => setMode('walk');

// ---- Walk look (drag on canvas anywhere except over joystick) ----
let lookTouch = null, lookLastX = 0, lookLastY = 0;
function inJoystick(x, y) {
  const r = document.getElementById('joystick').getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}
// mkkellogg's viewer attaches its own touch handlers to the canvas. We
// register at DOCUMENT level in CAPTURE phase so we run BEFORE those and can
// stopImmediatePropagation when walk mode is active.
document.addEventListener('touchstart', e => {
  if (mode !== 'walk') return;
  for (const t of e.changedTouches) {
    if (inJoystick(t.clientX, t.clientY)) continue;
    if (lookTouch === null) {
      lookTouch = t.identifier;
      lookLastX = t.clientX; lookLastY = t.clientY;
      e.preventDefault();
      e.stopImmediatePropagation();
    }
  }
}, { capture: true, passive: false });

document.addEventListener('touchmove', e => {
  if (mode !== 'walk') return;
  for (const t of e.changedTouches) {
    if (t.identifier !== lookTouch) continue;
    const dx = t.clientX - lookLastX, dy = t.clientY - lookLastY;
    lookLastX = t.clientX; lookLastY = t.clientY;
    applyLook(dx * 0.005, dy * 0.005);
    e.preventDefault();
    e.stopImmediatePropagation();
  }
}, { capture: true, passive: false });

function lookEnd(e) {
  for (const t of e.changedTouches) {
    if (t.identifier === lookTouch) {
      lookTouch = null;
      if (mode === 'walk') e.stopImmediatePropagation();
    }
  }
}
document.addEventListener('touchend', lookEnd, { capture: true, passive: false });
document.addEventListener('touchcancel', lookEnd, { capture: true, passive: false });

// Mouse (desktop) — same capture priority
let mDown = false, mLX = 0, mLY = 0;
document.addEventListener('mousedown', e => {
  if (mode !== 'walk' || inJoystick(e.clientX, e.clientY)) return;
  mDown = true; mLX = e.clientX; mLY = e.clientY;
  e.stopImmediatePropagation();
}, { capture: true });
document.addEventListener('mousemove', e => {
  if (!mDown || mode !== 'walk') return;
  applyLook((e.clientX - mLX) * 0.005, (e.clientY - mLY) * 0.005);
  mLX = e.clientX; mLY = e.clientY;
  e.stopImmediatePropagation();
}, { capture: true });
document.addEventListener('mouseup', () => mDown = false, { capture: true });

// Keyboard
addEventListener('keydown', e => {
  if (mode !== 'walk') return;
  if (['z','w','ArrowUp'].includes(e.key)) move.fwd = 1;
  if (['s','ArrowDown'].includes(e.key)) move.fwd = -1;
  if (['q','a','ArrowLeft'].includes(e.key)) move.right = -1;
  if (['d','ArrowRight'].includes(e.key)) move.right = 1;
});
addEventListener('keyup', e => {
  if (['z','w','s','ArrowUp','ArrowDown'].includes(e.key)) move.fwd = 0;
  if (['q','a','d','ArrowLeft','ArrowRight'].includes(e.key)) move.right = 0;
});

function applyLook(dyaw, dpitch) {
  const e = new THREE.Euler().setFromQuaternion(viewer.camera.quaternion, 'YXZ');
  e.y -= dyaw;
  e.x -= dpitch;
  e.x = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, e.x));
  viewer.camera.quaternion.setFromEuler(e);
}

let lastT = performance.now();
const dir = new THREE.Vector3(), right = new THREE.Vector3(), up = new THREE.Vector3(0,-1,0), tmp = new THREE.Vector3();
function tick(t) {
  const dt = Math.min(0.05, (t - lastT) / 1000); lastT = t;
  if (mode === 'walk' && (move.fwd || move.right)) {
    viewer.camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
    right.crossVectors(dir, up).normalize();
    const speed = sceneRadius * 0.3;
    tmp.copy(dir).multiplyScalar(move.fwd * speed * dt);
    tmp.addScaledVector(right, move.right * speed * dt);
    viewer.camera.position.add(tmp);
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
