<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Immo3D — PWA capture → InstantSplat</title>
<style>
  * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  html, body { margin:0; height:100%; background:#000; color:#fff;
               font-family:-apple-system,system-ui,sans-serif; overflow:hidden;
               overscroll-behavior:none }
  #stage { position:fixed; inset:0 }
  #stage canvas { width:100%; height:100%; display:block; touch-action:none }
  #hud { position:fixed; top:max(12px,env(safe-area-inset-top)); left:12px;
         right:12px; padding:8px 12px; background:rgba(0,0,0,.55);
         border-radius:8px; font-size:12px; backdrop-filter:blur(8px);
         pointer-events:none; z-index:10; text-align:center }
</style>
</head>
<body>
<div id="stage"></div>
<div id="hud">Loading 29 MB · 1.26M splats…</div>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
  "gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
}}
</script>
<script type="module">
import * as GS from 'gaussian-splats-3d';
const hud = document.getElementById('hud');
const viewer = new GS.Viewer({
  rootElement: document.getElementById('stage'),
  cameraUp: [0, -1, 0],
  sharedMemoryForWorkers: false,
});
viewer.addSplatScene('./maison-pwa-v2.ksplat', { format: GS.SceneFormat.KSplat, progressiveLoad: true })
  .then(() => { hud.textContent = 'PWA capture (20 frames) → InstantSplat 2k iters → 29 MB · 1.26M splats · drag = orbiter'; viewer.start(); })
  .catch(e => { hud.textContent = 'Erreur : ' + e.message; });
</script>
</body>
</html>
