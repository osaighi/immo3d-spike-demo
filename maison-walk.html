<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Immo3D — visite</title>
<style>
  * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  html, body { margin:0; height:100%; background:#000; color:#fff;
               font-family:-apple-system,system-ui,sans-serif; overflow:hidden;
               overscroll-behavior:none }
  #canvas { position:fixed; inset:0; width:100%; height:100%; outline:none; touch-action:none }
  #hud { position:fixed; top:max(12px,env(safe-area-inset-top)); left:12px;
         padding:8px 12px; background:rgba(0,0,0,.55); border-radius:8px;
         font-size:12px; backdrop-filter:blur(8px); pointer-events:none;
         max-width:65vw; z-index:10 }
  .btn { position:fixed; padding:12px 18px; color:#fff; border:0;
         border-radius:12px; font-size:14px; font-family:inherit;
         backdrop-filter:blur(8px); cursor:pointer; z-index:20;
         box-shadow:0 4px 16px rgba(0,0,0,.4) }
  #enter { bottom:max(20px,env(safe-area-inset-bottom)); left:50%;
           transform:translateX(-50%); background:rgba(31,79,255,.95);
           font-weight:600; font-size:15px; padding:14px 24px }
  #exit { display:none; bottom:max(20px,env(safe-area-inset-bottom));
          right:20px; background:rgba(0,0,0,.7) }
  #reset { display:none; bottom:max(20px,env(safe-area-inset-bottom));
           left:20px; background:rgba(0,0,0,.7) }
  body.walking #enter { display:none }
  body.walking #exit, body.walking #reset { display:block }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">Loading splat (~80 MB)…</div>
<button class="btn" id="enter">▶ Entrer dans la maison</button>
<button class="btn" id="exit">↑ Sortir</button>
<button class="btn" id="reset">⟲ Replacer</button>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const hud = document.getElementById('hud');
const enterBtn = document.getElementById('enter');
const exitBtn = document.getElementById('exit');
const resetBtn = document.getElementById('reset');

const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });
const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0, 0, 0, 1);
new BABYLON.HemisphericLight('h', new BABYLON.Vector3(0, 1, 0), scene);

// Create cameras FIRST (default position), wire UI, then load the splat,
// then reframe based on actual bounding info. This avoids the "No camera
// defined" first-frame race.
const orbitCam = new BABYLON.ArcRotateCamera('orbit',
  Math.PI / 4, Math.PI / 3, 5, BABYLON.Vector3.Zero(), scene);
orbitCam.minZ = 0.001;
orbitCam.maxZ = 5000;
orbitCam.wheelDeltaPercentage = 0.02;
orbitCam.pinchDeltaPercentage = 0.005;
scene.activeCamera = orbitCam;
orbitCam.attachControl(canvas, true);

const walkCam = new BABYLON.UniversalCamera('walk',
  new BABYLON.Vector3(0, 0, -5), scene);
walkCam.minZ = 0.001;
walkCam.maxZ = 5000;
walkCam.angularSensibility = 4500;
walkCam.inertia = 0.85;
walkCam.keysUp = [87, 90, 38];
walkCam.keysDown = [83, 40];
walkCam.keysLeft = [65, 81, 37];
walkCam.keysRight = [68, 39];
if ('ontouchstart' in window) walkCam.inputs.addVirtualJoystick();

let sceneCenter = BABYLON.Vector3.Zero();
let sceneRadius = 5;

// Engine render loop runs immediately so we always have a camera
engine.runRenderLoop(() => scene.render());
addEventListener('resize', () => engine.resize());

const splat = new BABYLON.GaussianSplattingMesh('splat', null, scene);
splat.loadFileAsync('./maison-cull.ply?v=cull').then(() => {
  // Use Babylon's own bounding info for reframing, in case the .ply
  // coordinate frame doesn't match our externally-computed metadata.
  const bb = splat.getBoundingInfo().boundingBox;
  const min = bb.minimumWorld, max = bb.maximumWorld;
  sceneCenter = max.add(min).scale(0.5);
  sceneRadius = max.subtract(min).length() * 0.5;
  console.log('splat bounds', { min: min.asArray(), max: max.asArray(),
                                center: sceneCenter.asArray(), radius: sceneRadius });

  // Place orbit OUTSIDE the splat cloud
  orbitCam.target = sceneCenter;
  orbitCam.radius = sceneRadius * 1.4;
  orbitCam.lowerRadiusLimit = sceneRadius * 0.1;
  orbitCam.upperRadiusLimit = sceneRadius * 4;
  walkCam.speed = sceneRadius * 0.015;

  hud.textContent = 'Vue d\'ensemble · drag = orbiter · pinch = zoom';
}).catch(e => {
  hud.textContent = 'Erreur load : ' + e.message;
  console.error(e);
});

enterBtn.onclick = () => {
  document.body.classList.add('walking');
  walkCam.position = sceneCenter.clone();
  walkCam.setTarget(sceneCenter.add(new BABYLON.Vector3(1, 0, 0)));
  orbitCam.detachControl();
  scene.activeCamera = walkCam;
  walkCam.attachControl(canvas, true);
  hud.textContent = 'Visite · drag = regarder · joystick = bouger';
};

exitBtn.onclick = () => {
  document.body.classList.remove('walking');
  walkCam.detachControl();
  scene.activeCamera = orbitCam;
  orbitCam.attachControl(canvas, true);
  hud.textContent = 'Vue d\'ensemble';
};

resetBtn.onclick = () => {
  walkCam.position = sceneCenter.clone();
  walkCam.setTarget(sceneCenter.add(new BABYLON.Vector3(1, 0, 0)));
};
</script>
</body>
</html>
